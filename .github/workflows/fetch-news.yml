name: Fetch News (30 min)

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes, all day
  workflow_dispatch:           # manual trigger from GitHub Actions tab

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news
        run: python3 scripts/fetch_news.py

      - name: Commit updated news
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet || git commit -m "chore: refresh news [$(date -u '+%H:%M UTC')]"

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
